<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex5_5</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
    <img src="./img/ex5_5.jpg" alt="Conta do mes" class="alta">
    <h1>Programa Conta do Mês</h1>
    <form action="">
        <div>
            <label for="descricao">Informe a descrição da conta</label>
            <input type="text"  id="descricao" required>
        </div>
          <div>
            <label for="valor">Informe o valor</label>
            <input type="number"  id="valor" required min="0" step="0.01">
        </div>
        <button type="submit">Registrar Conta</button>
    </form>
    <pre id="resp1"></pre>
     <pre id="resp2"></pre>
     <script src="js/ex5_5.js"></script>
</body>
</html>
